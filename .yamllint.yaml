# yamllint configuration
# See https://yamllint.readthedocs.io/en/stable/rules.html
#
# We include many of the default rules but further annotate this file with
# comments to explain what the rule does
#
# This can be used to check KYAML files, but prefer to use the
# .yamllint-kyaml.kyaml file which has stricter rules for KYAML files

extends: default

yaml-files:
  - "*.yaml"
  - "*.yml"
  - ".yamllint"

# Paths to skip when yamllint walks a tree. Mirrors the canonical "do not
# lint generated/legacy" set so `yamllint .` (CI) and pre-commit behave
# the same. KYAML files are also skipped here — they're linted by the
# stricter `.yamllint-kyaml.kyaml` config invoked separately.
ignore: |
  legacy/
  dist/
  target/
  .venv/
  docs/public/
  docs/resources/
  docs/assets/dashboards/
  charts/*/pre-rendered/
  charts/*/templates/
  *.kyaml

rules:
  # Prefer to not use anchors, as they are only intended for power users
  # KYAML does not support anchors at all (but there's no forbid option)
  anchors:
    forbid-undeclared-aliases: true
    forbid-duplicated-anchors: true
    forbid-unused-anchors: true
  # Use default rules for braces except max-space-empty-inside (default -1)
  # Braces are required for KYAML
  braces:
    forbid: false
    max-spaces-inside: 0
    max-spaces-inside-empty: 0
  # Use default rules for brackets except max-space-empty-inside (default -1)
  # Brackets are required for KYAML
  brackets:
    forbid: false
    max-spaces-inside: 0
    max-spaces-inside-empty: 0
  # Document end is not recommended (default is to not check)
  document-end:
    present: false
    level: warning
  # Document start is not recommended (can cause an empty doc[0])
  document-start:
    present: false
    level: warning
  # Empty lines are encouraged in values.yaml for readability between sections
  empty-lines: disable
  # Stricter checks than default for accidental colons/commas.
  # forbid-in-block-mappings disabled: `pull_request:` (GH Actions) and
  # `__mainSection:` (helm-docs sentinels) are idiomatic empty block keys.
  empty-values:
    forbid-in-block-mappings: false
    forbid-in-flow-mappings: true
    forbid-in-block-sequences: true
  # Stricter than default for floats
  float-values:
    # YAGNI
    forbid-inf: true
    forbid-nan: true
    # usually looks like a typo
    forbid-scientific-notation: true
    # can be hard to discern
    require-numeral-before-decimal: true
  # We support both main styles of indented lists
  # But expect a consistent 2 spaces
  indentation:
    spaces: 2
    # Prefer indenting sequences
    # Some frameworks do not support indentation (like python tools)
    indent-sequences: consistent
    # check-multi-line-strings behavior is whacky
    check-multi-line-strings: false
  # Let's be generous with line length (default is 80)
  line-length:
    max: 160
    allow-non-breakable-words: true
    allow-non-breakable-inline-mappings: true
    level: warning
  new-line-at-end-of-file: enable
  # Strict octals for best compat between YAML 1.1 and 1.2
  octal-values:
    forbid-implicit-octal: true
    forbid-explicit-octal: true
  # Bring opinions about quotes where possible.
  # Demoted to warning: enforces guidance without blocking commits — the
  # stricter .yamllint-kyaml.kyaml config keeps quoting strict for KYAML.
  quoted-strings:
    level: warning
    quote-type: double
    # KYAML requires quoting strings
    required: false
    # extra-required:
    #   # starting with non-alphanumeric
    #   - "^\\W"
    #   # containing YAML special characters
    #   - "[\\{\\[:]"
    # Allow single quote around double quotes
    allow-quoted-quotes: true
    # Quote keys when they contain special characters
    check-keys: true
  # Require on/off to be quoted
  truthy:
    allowed-values:
      - "true"
      - "false"
    check-keys: false
