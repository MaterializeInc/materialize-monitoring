# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: loki subchart and validators
chart:
  version: 1.2.3
  appVersion: 4.5.6
release:
  name: test-mon
  revision: 5
  namespace: test-monitoring
set:
  tags.default: false
  tags.loki: true
  loki.loki.storage.bucketNames.chunks: "test-chunks"
  loki.loki.storage.bucketNames.ruler: "test-ruler"
  loki.networkPolicy.metrics.namespaceSelector:
    matchLabels:
      test-metrics: "true"
  loki.networkPolicy.ingress.namespaceSelector:
    matchLabels:
      loki-ok: "true"
tests:
  - it: should have loki enabled with circuit-breaker
    set:
      tags.default: false
      tags.loki: false
      loki.enabled: true
    template: ../charts/loki/templates/serviceaccount.yaml
    asserts:
      - containsDocument:
          apiVersion: v1
          kind: ServiceAccount
          name: loki
          namespace: test-monitoring
  - it: should have loki enabled with bundled-backends tags
    set:
      tags.default: false
      tags.loki: false
      tags.bundled-backends: true
      thanos.enabled: false
    template: ../charts/loki/templates/serviceaccount.yaml
    asserts:
      - containsDocument:
          apiVersion: v1
          kind: ServiceAccount
          name: loki
          namespace: test-monitoring
  - it: should have loki enabled with loki tags
    set:
      tags.default: false
      tags.bundled-backends: false
      tags.loki: true
    template: ../charts/loki/templates/serviceaccount.yaml
    asserts:
      - containsDocument:
          apiVersion: v1
          kind: ServiceAccount
          name: loki
          namespace: test-monitoring
  # This test case doesn't work since it relies on the template to exist
  # - it: should not loki enabled with circuit-breaker off
  #   set:
  #     loki.enabled: false
  #   template: ../charts/loki/templates/serviceaccount.yaml
  #   asserts:
  #     - hasDocuments:
  #         count: 0
  - it: should fail if buckets are not defined
    set:
      loki.loki.storage.bucketNames.chunks: "<REPLACE-ME>"
      loki.loki.storage.bucketNames.ruler: "<REPLACE-ME>"
    template: validate.yaml
    asserts:
      - failedTemplate:
          errorPattern: "loki.loki.storage.bucketNames.chunks is required"
      - failedTemplate:
          errorPattern: "loki.loki.storage.bucketNames.ruler is required"

  # Backend-consistency guard: the compactor's delete-request store must name the
  # same backend as storage.object_store.type, or the compactor fails at startup
  # ("no s3 endpoint in config file"). Here object_store is gcs while the base
  # default delete_request_store stays s3 → validation must catch it.
  - it: should fail when the compactor delete-request store backend mismatches the object store
    set:
      loki.loki.storage.object_store.type: gcs
      # loki.loki.compactor.delete_request_store intentionally left at the base default (s3)
    template: validate.yaml
    asserts:
      - failedTemplate:
          errorPattern: "delete_request_store.*must match.*object_store\\.type"

  - it: fails in downstream chart when buckets are not defined
    set:
      loki.loki.storage.bucketNames.chunks: ""
    template: ../charts/loki/templates/ruler/statefulset.yaml
    asserts:
      - failedTemplate:
          errorPattern: "Please define loki.storage.bucketNames.chunks"

  # Warnings surface in NOTES.txt (and validate.yaml comments); assert on the
  # raw NOTES.txt output. The `replication_factor 3` in the pattern also proves
  # mzmon.loki.replicationFactor reads the real RF (loki.loki.commonConfig).
  - it: warns when an ingester rolling-update maxUnavailable exceeds 1
    set:
      loki.ingester.updateStrategy.rollingUpdate.maxUnavailable: 2
    template: NOTES.txt
    asserts:
      - matchRegexRaw:
          pattern: 'ingester\.updateStrategy\.rollingUpdate\.maxUnavailable is 2: with replication_factor 3'

  - it: warns when the ingester PDB maxUnavailable exceeds 1
    set:
      loki.ingester.podDisruptionBudget.maxUnavailable: 2
    template: NOTES.txt
    asserts:
      - matchRegexRaw:
          pattern: 'ingester\.podDisruptionBudget\.maxUnavailable is 2:.*write quorum'

  - it: does not warn about ingester maxUnavailable at the defaults
    template: NOTES.txt
    asserts:
      - matchRegexRaw:
          pattern: 'maxUnavailable is [0-9]'
        not: true
