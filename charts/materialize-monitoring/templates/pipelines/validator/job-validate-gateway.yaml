{{- $fullname := include "mzmon.fullname" . }}
{{- $gatewayValues := index .Values "alloy-gateway" | required "alloy-gateway values are required" }}
{{- $pipelineValues := .Values.pipeline }}
{{- $defaultAnnotations := dict
  "helm.sh/hook" "pre-install,pre-upgrade"
  "helm.sh/hook-weight" "0"
  "helm.sh/hook-delete-policy" "before-hook-creation"
}}
{{- if and ( include "mzmon.alloyGateway.enabled" $ ) $pipelineValues.preValidateJob.enabled }}
kind: Job
apiVersion: batch/v1
metadata:
  name: {{ $fullname }}-validate-gateway
  namespace: {{ include "mzmon.alloyGateway.namespace" $ }}
  labels:
    {{- include "mzmon.labels" $ | nindent 4 }}
    app.kubernetes.io/component: alloy-gateway
  annotations:
    {{- include "mzmon.annotations" $ | nindent 4 }}
    {{- if $pipelineValues.preValidateJob.annotations }}
      {{- toYaml $pipelineValues.preValidateJob.annotations | nindent 4 }}
    {{- else }}
      {{- toYaml $defaultAnnotations | nindent 4 }}
    {{- end }}
spec:
  backoffLimit: {{ $pipelineValues.preValidateJob.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "mzmon.labels" $ | nindent 8 }}
        app.kubernetes.io/component: alloy-gateway
    spec:
      serviceAccountName: {{ include "mzmon.alloyGateway.serviceAccountName" $ }}
      restartPolicy: Never
      securityContext:
        {{- toYaml $pipelineValues.preValidateJob.podSecurityContext | nindent 8 }}
      containers:
        - name: validate-gateway
          image: {{ include "mzmon.alloyGateway.image" $ | quote }}
          imagePullPolicy: {{ $gatewayValues.image.pullPolicy }}
          command:
            - alloy
            - validate
            - /etc/alloy/{{ include "mzmon.alloyGateway.configMap.key" $ }}
          securityContext:
            {{- toYaml $pipelineValues.preValidateJob.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ $fullname }}-validate-gateway
{{- end }}
