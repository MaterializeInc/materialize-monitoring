{{- if ( include "mzmon.alloyGateway.enabled" $ ) }}
{{- $fullname := printf "%s-%s" ( include "mzmon.fullname" $ ) "alloy-gateway-env" }}
kind: ConfigMap
apiVersion: v1
metadata:
  name: {{ $fullname }}
  namespace: {{ include "mzmon.alloyGateway.namespace" $ }}
  labels:
    {{- include "mzmon.labels" $ | nindent 4 }}
    app.kubernetes.io/component: alloy-gateway
  annotations:
    {{- include "mzmon.annotations" $ | nindent 4 }}
data:
  {{- tpl ( toYaml .Values.pipeline.env ) $ | nindent 2 }}
  {{- $lokiDest := .Values.pipeline.logging.gateway.destination.loki }}
  {{- if $lokiDest.enabled }}
  GATEWAY_LOKI_DEST: {{ tpl $lokiDest.url $ | quote }}
    {{- if eq $lokiDest.authType "none" }}
    {{- else if eq $lokiDest.authType "basicAuth" }}
      {{- if $lokiDest.basicAuth.username }}
  {{ $lokiDest.basicAuth.usernameEnv }}: {{ tpl $lokiDest.basicAuth.username $ | quote }}
      {{- end }}
      {{- if $lokiDest.basicAuth.password }}
  {{ $lokiDest.basicAuth.passwordEnv }}: {{ tpl $lokiDest.basicAuth.password $ | quote }}
      {{- end }}
    {{- else if eq $lokiDest.authType "bearer" }}
      {{- if $lokiDest.bearer.token }}
  {{ $lokiDest.bearer.tokenEnv }}: {{ tpl $lokiDest.bearer.token $ | quote }}
      {{- end }}
    {{- else }}
      {{- printf "Unsupported .Values.pipeline.logging.gateway.destination.loki.authType (%s)" $lokiDest.authType | fail }}
    {{- end }}
    {{- if $lokiDest.tls.enabled }}
      {{- fail "TLS is not supported for the alloy-gateway loki destination yet" }}
    {{- end }}
  {{- end }}
  {{- /* </lokiDest> */}}
  {{- $promDest := .Values.pipeline.metrics.gateway.destination.prometheusRemoteWrite }}
  {{- if $promDest.enabled }}
  GATEWAY_PROM_DEST: {{ tpl $promDest.url $ | quote }}
    {{- if eq $promDest.authType "none" }}
    {{- else if eq $promDest.authType "basicAuth" }}
      {{- if $promDest.basicAuth.username }}
  {{ $promDest.basicAuth.usernameEnv }}: {{ tpl $promDest.basicAuth.username $ | quote }}
      {{- end }}
      {{- if $promDest.basicAuth.password }}
  {{ $promDest.basicAuth.passwordEnv }}: {{ tpl $promDest.basicAuth.password $ | quote }}
      {{- end }}
    {{- else if eq $promDest.authType "bearer" }}
      {{- if $promDest.bearer.token }}
  {{ $promDest.bearer.tokenEnv }}: {{ tpl $promDest.bearer.token $ | quote }}
      {{- end }}
    {{- else if eq $promDest.authType "sigv4" }}
      {{- /* SigV4 signs with ambient AWS credentials (IRSA); region/roleArn go
             straight into the alloy config, so no env secrets are needed here. */}}
    {{- else }}
      {{- printf "Unsupported .Values.pipeline.metrics.gateway.destination.prometheusRemoteWrite.authType (%s)" $promDest.authType | fail }}
    {{- end }}
    {{- if $promDest.tls.enabled }}
      {{- fail "TLS is not supported for the alloy-gateway prometheus destination yet" }}
    {{- end }}
  {{- end }}
  {{- /* </promDest> */}}
  {{- $tenancy := $.Values.pipeline.logging.tenancy | required "pipeline.logging.tenancy is required" }}
  GATEWAY_STATIC_TENANT: {{ $tenancy.staticTenant | quote }}
  {{- if hasPrefix $tenancy.tenantLabel "__meta_kubernetes" }}
  GATEWAY_TENANT_LABEL: {{ $tenancy.tenantLabel | quote }}
  {{- else }}
  GATEWAY_TENANT_LABEL: __meta_kubernetes_pod_label_{{ $tenancy.tenantLabel | replace "/" "_" | replace "." "_" | quote }}
  {{- end }}
  GATEWAY_TENANT_MAP_INFRA: {{ $tenancy.tenantMap.infra | quote }}
  GATEWAY_TENANT_MAP_AUDIT: {{ $tenancy.tenantMap.audit | quote }}
  GATEWAY_TENANT_MAP_ENVIRONMENT: {{ $tenancy.tenantMap.environment | quote }}
{{- end }}
