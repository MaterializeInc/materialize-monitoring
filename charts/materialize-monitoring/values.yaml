# -- Values that are passed to all subcharts
# @notationType -- (sectionstart) Globals
global:
  # -- Override the registry for all images in this chart and its subcharts. Leave empty to use upstream defaults.
  imageRegistry: ""
  # -- Image pull secrets applied to every workload in this chart and its subcharts.
  imagePullSecrets: []

# -- Configuration for the main chart
# @notationType -- (sectionstart) Main chart configuration
__mainSection:

# -- Standard Helm name override.
# Note that in umbrella charts, fullname may be shorted.
# See fullnameOverride.
nameOverride: ""
# -- Standard Helm fullname override.
# Note that in umbrella charts, this may be shortened to avoid long prefixes.
# (and have more stable names in resources)
fullnameOverride: "mzmon"
# -- Namespace override for default workloads.
namespaceOverride: ""

# -- Group toggles for subchart enablement.
# @notationType -- (sectionstart) Subchart enablement (Helm tags)
# @raw
# Subchart enablement has two layers, in precedence order:
#
# 1. **Per-chart circuit breaker (`<chart>.enabled`).** Each subchart
#    dependency carries a `condition: <chart>.enabled` in `Chart.yaml`.
#    The corresponding `enabled:` key is left commented-out under each
#    subchart block in `values.yaml`; uncommenting it force-includes
#    (`true`) or force-excludes (`false`) that chart regardless of any
#    tag state. Helm evaluates `condition:` first and only falls through
#    to tags when the path is absent from values, so this is a hard
#    override.
# 2. **Helm tags (the `tags:` block).** When no `<chart>.enabled` is set,
#    enablement is decided by tags. Each dependency in `Chart.yaml`
#    carries the master `default` tag, a *group tag* (e.g.
#    `bundled-backends`), and a *per-chart tag* (e.g. `loki`); a dependency
#    is included if any of its tags evaluates true (OR semantics). To opt
#    one chart out of an otherwise-enabled group, set the group tag false
#    and flip the per-chart tags individually — or use the circuit breaker.
#
# Group ↔ chart mapping:
#
# | Group tag          | Charts                                              |
# | ------------------ | --------------------------------------------------- |
# | `default`          | `pipeline` + `bundled-backends` + `managed-grafana` |
# |                    | groups + `kube-state-metrics` (recommended stack)   |
# | `pipeline`         | `alloy-agent`, `alloy-gateway`                      |
# | `bundled-backends` | `loki`, `thanos`, `alertmanager`                    |
# | `managed-grafana`  | `grafana`, `grafana-operator`                       |
# | `cluster-metrics`  | `kube-state-metrics`, `metrics-server`              |
# | `crds`             | `prometheus-operator-crds`                          |
#
# `default` is the only group on by default and enables the full
# recommended stack. `--set tags.default=false` turns everything off, so
# you can enable a single group (`bundled-backends`, `managed-grafana`,
# `pipeline`, `cluster-metrics`) or individual charts on top. Profile
# preset values files under `profiles/` flip these appropriately.
# (`kube-state-metrics` is in `default`, but `metrics-server` is not —
# most clusters already run metrics-server; enable it via
# `tags.cluster-metrics` or `tags.metrics-server` if yours doesn't.)
tags:
  # Group toggles
  # -- Enable all recommended defaults.
  # You can `--set tags.default=false` to disable all services and explicitly enable others.
  default: true
  # -- Enable both Alloy releases (agent + gateway).
  pipeline: false
  # -- Enable Loki, Thanos, and Alertmanager as a group. (Grafana is in the
  # `managed-grafana` group.)
  bundled-backends: false
  # -- Enable kube-state-metrics and metrics-server as a group.
  cluster-metrics: false
  # Per-chart overrides (OR'd with the group tag above)
  # -- Per-chart override: enable just the Alloy agent. OR'd with `tags.default` / `tags.pipeline`.
  alloy-agent: false
  # -- Per-chart override: enable just the Alloy gateway. OR'd with `tags.default` / `tags.pipeline`.
  alloy-gateway: false
  # -- Per-chart override: enable just Loki. OR'd with `tags.default` / `tags.bundled-backends`.
  loki: false
  # -- Per-chart override: enable just Thanos. OR'd with `tags.default` / `tags.bundled-backends`.
  thanos: false
  # -- Per-chart override: enable just Grafana standalone. OR'd with `tags.default` / `tags.managed-grafana`.
  grafana-standalone: false
  # -- Per-chart override: enable just Grafana operator. OR'd with `tags.default` / `tags.managed-grafana`.
  grafana-operator: false
  # -- Per-chart override: enable just Alertmanager. OR'd with `tags.default` / `tags.bundled-backends`.
  alertmanager: false
  # -- Per-chart override: enable just kube-state-metrics. OR'd with `tags.default` / `tags.cluster-metrics`.
  kube-state-metrics: false
  # -- Per-chart override: enable just metrics-server. OR'd with `tags.cluster-metrics`.
  metrics-server: false

# -- Materialize-specific configuration values.
# @notationType -- (sectionstart) Materialize Integration
materialize:
  # -- Namespaces to scrape Materialize workloads from. Empty list means all namespaces the chart can read.
  namespaces: []
  # -- Logical environment label applied to all scraped Materialize telemetry.
  environmentLabel: ""
  podMonitor:
    # -- Deploy a PodMonitor to collect Materialize metrics.
    enabled: true
    # -- Which endpoints to scrape on environmentd pods.
    # Note that `/metrics/public` did not become available until v26.25.
    # For earlier versions, you may wish to use `/metrics` instead.
    environmentdEndpoints:
      - /metrics/public
  # -- Deployment mode normalization hint. One of: `self-managed`, `cloud`. Drives relabeling rules in the pipeline.
  deploymentMode: self-managed

# -- Pipeline configuration values that drive Alloy behavior and defaults.
# @notationType -- (sectionstart) Pipeline configuration
# @raw
#
# The Alloy pipeline is the flagship deliverable of this chart.
# Pipeline configuration is expressed in values, rendered into ConfigMaps under
# `templates/pipelines/`, and consumed by the Alloy agent and gateway
# release instances.
pipeline:
  preValidateJob:
    # -- Run a hook/dependency to validate rendered configs before rolling them out
    enabled: true
    # -- Job specific annotations
    # This should be used to control when the job is executed.
    # The default is as a helm hook, but setting any other annotation overrides this.
    # @default -- `{"helm.sh/hook": "pre-install,pre-upgrade", "helm.sh/hook-delete-policy": "before-hook-creation"}`
    annotations: {}
    # -- Number of times to retry the job before failing the release.
    backoffLimit: 1

    # -- Security context for the pre-validate job pod.
    # This is the hardened recommendation with the alloy user.
    podSecurityContext:
      runAsUser: 473
      runAsGroup: 473
      fsGroup: 473

    # -- Security context for the pre-validate job container.
    # This is the hardened recommendation with the alloy user.
    containerSecurityContext:
      runAsNonRoot: true
      runAsUser: 473
      runAsGroup: 473
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
  # -- Environment variables to set in agent and gateway pods.
  # These support tpl rendering.
  # Since these are injected into an envFrom, any env entries take precedence.
  # @default -- {}
  env:
    # -- Name of the cluster to discriminate workloads from different sources.
    CLUSTER_NAME: "default"
  # -- (h4) Configuration for log behavior
  # @notationType -- (sectionstart) Log configuration
  logging:
    agent:
      # -- Rate limit for alloy agent incoming pod logs.
      # This is per agent.
      rateLimit: 5000
      # -- Burst limit for alloy agent incoming pod logs.
      burst: 20000

      destination:
        loki:
          # -- alloy-gateway push endpoint URL.
          url: 'http://alloy-gateway.{{ include "mzmon.alloyGateway.namespace" $ }}.svc:3100/loki/api/v1/push'
          # -- Retry configuration.
          retries:
            maxBackoffRetries: 10
            minBackoffPeriod: 1s
            maxBackoffPeriod: 5m
            retryOnHttp429: true
          # -- Type of authentication to use with the alloy-gateway endpoint.
          # Use none if no authentication is required.
          authType: none
          tls:
            # -- Whether to enable TLS for alloy-gateway dest.
            enabled: false
            # -- Whether to verify the TLS certificate for the alloy-gateway dest.
            verify: true
            # -- Certificate Authority (CA) PEM contents for TLS.
            ca: ""
            caEnv: AGENT_LOKI_DEST_TLS_CA
            # -- Client certificate PEM contents for TLS.
            cert: ""
            certEnv: AGENT_LOKI_DEST_TLS_CERT
            # -- Client private key PEM contents for TLS.
            key: ""
            keyEnv: AGENT_LOKI_DEST_TLS_KEY
            # -- Alternative SNI (Server Name Indication) to specify.
            serverName: ""
            # -- Minimum TLS version to allow.
            # Use TLS12 if you need better compat.
            # TLS11 and TLS10 are not recommended for production.
            minVersion: TLS13

    gateway:
      destination:
        loki:
          # -- Enable writing to a loki destination.
          # By default, we use the in-cluster loki
          enabled: true
          # -- Loki push endpoint URL.
          url: 'http://loki-distributor.{{ include "mzmon.loki.namespace" $ }}.svc:3100/loki/api/v1/push'
          # -- Retry configuration.
          retries:
            maxBackoffRetries: 10
            minBackoffPeriod: 1s
            maxBackoffPeriod: 5m
            retryOnHttp429: true
          # -- Type of authentication to use with the loki endpoint.
          # Use none if no authentication is required.
          # Use basicAuth for username/password.
          # Use bearer for bearer token.
          # Use oauth2 for OAuth2 client credentials.
          authType: none
          # -- Configuration for auth when using authType=basicAuth
          # You will need to provide alloy-gateway.alloy.agent.extraEnv
          # TODO: add a check for this
          basicAuth:
            password: ""
            passwordEnv: GATEWAY_LOKI_DEST_PASSWORD
            username: ""
            usernameEnv: GATEWAY_LOKI_DEST_USERNAME
          # -- Configuration for bearer token when using authType=bearer
          # This is used for bearer type tokens.
          bearer:
            token: ""
            tokenEnv: GATEWAY_LOKI_DEST_BEARER_TOKEN
          # -- Configuration for OAuth2 when using authType=oauth2
          oauth2:
            clientId: ""
            clientIdEnv: GATEWAY_LOKI_DEST_OAUTH2_CLIENT_ID
            clientSecret: ""
            clientSecretEnv: GATEWAY_LOKI_DEST_OAUTH2_CLIENT_SECRET
            scopes: []
            tokenUrl: ""
            tokenUrlEnv: GATEWAY_LOKI_DEST_OAUTH2_TOKEN_URL
          tls:
            # -- Whether to enable TLS for the loki destination.
            enabled: false
            # -- Whether to verify the TLS certificate for the loki destination.
            verify: true
            # -- Certificate Authority (CA) PEM contents for TLS.
            ca: ""
            caEnv: GATEWAY_LOKI_DEST_TLS_CA
            # -- Client certificate PEM contents for TLS.
            cert: ""
            certEnv: GATEWAY_LOKI_DEST_TLS_CERT
            # -- Client private key PEM contents for TLS.
            key: ""
            keyEnv: GATEWAY_LOKI_DEST_TLS_KEY
            # -- Alternative SNI (Server Name Indication) to specify.
            serverName: ""
            # -- Minimum TLS version to allow.
            # Use TLS12 if you need better compat.
            # TLS11 and TLS10 are not recommended for production.
            minVersion: TLS13
        otlp:
          # -- Enable writing to an OTLP destination.
          # By default, we do not use the OTLP destination.
          enabled: false
          # -- Use metric OTLP destination.
          shareMetricDestination: false
          # -- Protocol to use for OTLP.
          # Use grpc for gRPC protocol.
          # Use http for HTTP protocol.
          protocol: grpc
          # -- OTLP push endpoint URL.
          url: ""
    tenancy:
      # -- Default tenant to write logs to.
      # This is used when tenantMap values is set to `static`.
      staticTenant: loki
      tenantLabel: app.kubernetes.io/name
      # -- Type of tenancy used to write logs.
      # Use static to write to the staticTenant value (recommended).
      # Use byEnvironment to separate by the environment name.
      # Use byNamespace to use the namespace of the source pod as the tenant.
      # Use byLabel to use a label (tenantLabel) to specifically identify the tenant.
      # Use none to disable tenancy (only use if loki does not have tenancy).
      tenantMap:
        default: static
        infra: static
        audit: static
        environment: static

  # -- (h4) Configuration for metrics behavior
  # @notationType -- (sectionstart) Metrics configuration
  metrics:
    gateway:
      destination:
        prometheusRemoteWrite:
          # -- Enable writing to a Prometheus remote write destination.
          # We default to in-cluster Thanos.
          enabled: true

          # -- Prometheus remote write endpoint URL.
          url: 'http://thanos-receive.{{ include "mzmon.thanos.namespace" $ }}.svc:10908/api/v1/receive'

          # -- Type of authentication to use with the loki endpoint.
          # Use none if no authentication is required.
          # Use basicAuth for username/password.
          # Use bearer for bearer token.
          # Use oauth2 for OAuth2 client credentials.
          # Use sigv4 for AWS SigV4 signing (For AMP).
          authType: none
          # -- Configuration for auth when using authType=basicAuth
          basicAuth:
            password: ""
            passwordEnv: GATEWAY_PROMETHEUS_DEST_PASSWORD
            username: ""
            usernameEnv: GATEWAY_PROMETHEUS_DEST_USERNAME
          # -- Configuration for bearer token when using authType=bearer
          # This is used for bearer type tokens.
          bearer:
            token: ""
            tokenEnv: GATEWAY_PROMETHEUS_DEST_BEARER_TOKEN
          # -- Configuration for OAuth2 when using authType=oauth2
          oauth2:
            clientId: ""
            clientIdEnv: GATEWAY_PROMETHEUS_DEST_OAUTH2_CLIENT_ID
            clientSecret: ""
            clientSecretEnv: GATEWAY_PROMETHEUS_DEST_OAUTH2_CLIENT_SECRET
            scopes: []
            tokenUrl: ""
            tokenUrlEnv: GATEWAY_PROMETHEUS_DEST_OAUTH2_TOKEN_URL
          # -- Configuration for AWS signatures when using authType=sigv4
          # This generally does not need to be set (it is derived from IRSA).
          sigv4:
            region: ""
            roleArn: ""
          tls:
            # -- Whether to enable TLS for the prometheus destination.
            enabled: false
            # -- Whether to verify the TLS certificate for the prometheus destination.
            verify: true
            # -- Certificate Authority (CA) PEM contents for TLS.
            ca: ""
            caEnv: GATEWAY_PROMETHEUS_DEST_TLS_CA
            # -- Client certificate PEM contents for TLS.
            cert: ""
            certEnv: GATEWAY_PROMETHEUS_DEST_TLS_CERT
            # -- Client private key PEM contents for TLS.
            key: ""
            keyEnv: GATEWAY_PROMETHEUS_DEST_TLS_KEY
            # -- Alternative SNI (Server Name Indication) to specify.
            serverName: ""
            # -- Minimum TLS version to allow.
            # Use TLS12 if you need better compat.
            # TLS11 and TLS10 are not recommended for production.
            minVersion: TLS13
        otlp:
          # -- Enable writing to an OTLP destination.
          # By default, we do not use the OTLP destination.
          enabled: false
          # -- Protocol to use for OTLP.
          # Use grpc for gRPC protocol.
          # Use http for HTTP protocol.
          protocol: grpc
          # -- OTLP push endpoint URL.
          url: ""

# -- Configuration for dashboards, rules, and alerts
# @notationType -- (sectionstart) Monitoring configurations
# @raw
#
# Underlying content is generated into `pre-rendered/`
# from the sources under `packages/` and embedded via `.Files.Get`.
dashboards:
  config:
    grafana:
      # -- Install the bundled Grafana dashboards. Requires the Grafana operator or a writable Grafana instance.
      enabled: true
      # -- Grafana deployment mode, either "standalone" (the bundled Grafana chart) or "operator" (a separate Grafana Operator instance).
      mode: "operator"

      manifest:
        # -- Time to sync the dashboard from the manifest
        resyncPeriod: 5m
        # -- Non-default label selector for a Grafana-operator Grafana instance
        # @default -- `{}`
        instanceSelector: {}
        # -- Dashboard API Version (v2 or v2beta1)
        apiTarget: "dashboard.grafana.app/v2"
    datadog:
      # -- Install the bundled Datadog dashboards. Requires Datadog API credentials configured out-of-band.
      enabled: false
  # -- List of dashboard patterns to render
  # @default -- `["env-*"]`
  selected:
    - env-*

config:
  # -- (h4) Configuration for rules
  # @notationType -- (sectionstart) Rule configuration
  rules:
    prometheus:
      # -- Install the bundled Prometheus recording and alerting rules as PrometheusRule resources.
      enabled: true
    loki:
      # -- Install the bundled Loki rules.
      enabled: false
    thanos:
      # -- Install the bundled Thanos rules.
      enabled: false

  # -- (h4) Configuration for alerts
  # @notationType -- (sectionstart) Alert configuration
  alerts:
    # -- Install the bundled Alertmanager routing and templates.
    enabled: true

  # -- (h4) Configuration for scrapers
  # @notationType -- (sectionstart) Scraper configuration
  scrapers:
    # -- Install ServiceMonitors / Alloy scrape configs for Materialize and adjacent components.
    enabled: true

connections:
  # -- (h4) How to talk to a grafana instance
  # @notationType -- (sectionstart) Grafana connection configuration
  grafana:
    # -- How this establishes its connection to Grafana. `bundled` means it uses the grafana provisioning chart.
    mode: bundled

    # -- Labels applied to Grafana instance
    # @default -- `{}`
    labels: {}

    # https://grafana.github.io/grafana-operator/docs/api/#grafanaspecexternal
    external:
      # -- External grafana uri
      url: ""
      # -- Secret for Grafana admin password
      # @default -- `{}`
      adminPassword: {}
      # -- Secret for Grafana admin user
      # @default -- `{}`
      adminUser: {}
      # -- Secret for Grafana API key
      # @default -- `{}`
      apiKey: {}

# -- Configuration for bundled subcharts
# @notationType -- (sectionstart) Bundled subchart configurations
_subchartSection: stub

# -- (h4) Alloy collector instance running close to scrape targets. Pre-egress shaping happens here.
# @notationType -- (sectionstart) Alloy Agent
# @raw
#
# Upstream reference:
#   * https://github.com/grafana/alloy/tree/main/operations/helm/charts/alloy
#   * https://github.com/grafana/alloy/blob/main/operations/helm/charts/alloy/values.yaml
alloy-agent:
  # Circuit breaker (precedence over `tags.default`, `tags.pipeline`, and `tags.alloy-agent`):
  # enabled: true
  # -- Standard Helm full-name override.
  # We use a static name for deterministic relations.
  fullnameOverride: "alloy-agent"
  # -- Namespace override.
  namespaceOverride: null
  # -- Control for the PodLogs crd.
  crds:
    create: false

  global:
    # -- Security context for the alloy agent pods.
    podSecurityContext:
      runAsUser: 473
      runAsGroup: 473
      fsGroup: 473

  alloy:
    configMap:
      create: false

      name: mzmon-alloy-agent
      key: config.alloy

    clustering:
      enabled: false

    # -- Stability level of alloy components.
    stabilityLevel: generally-available

    enableReporting: false

    storagePath: /tmp/alloy

    # -- Extra environment variables to pass to the alloy agent pod.
    extraEnv: []
    # -- Environment variable configmaps/secrets to pass to the alloy agent pod.
    envFrom:
      - configMapRef:
          name: mzmon-alloy-agent-env
      - secretRef:
          name: mzmon-alloy-agent-env
          optional: true

    # -- Volume mounts to expose to alloy agent.
    mounts:
      varlog: true

      extra:
        - name: tmp
          mountPath: /tmp

    # -- Security context for the alloy agent containers.
    # The agent MUST run as root in order to be able to read container logs.
    securityContext:
      runAsNonRoot: false
      runAsUser: 0
      runAsGroup: 473
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
        # Unfortunately, DAC_READ_SEARCH is not sufficient to avoid root privileges
        # add: [DAC_READ_SEARCH]

    # -- Resources for the alloy agent containers.
    resources:
      limits:
        cpu: 100m
        memory: 200Mi
      requests:
        cpu: 100m
        memory: 200Mi

  image:
    registry: ghcr.io
    repository: materializeinc/mzmon-alloy
    tag: v1.17.0-mz1
    digest: sha256:c47e93792dd1b6ddcd75207d49eaa6610a4db4837d950a582bf7ff8563acd68f
    pullPolicy: IfNotPresent

  configReloader:
    enabled: false

  controller:
    type: daemonset

    extraLabels: {}
    # -- Extra annotations to apply to the alloy agent pod.
    # If you are using pulumi, be sure to add
    # `config.kubernetes.io/depends-on: job/mzmon-validate-agent`
    extraAnnotations: {}

    hostNetwork: false
    hostPid: false

    nodeSelector: {}
    tolerations:
      - key: node.materialize.com/daemonsets-not-scheduled
        operator: Exists

    priorityClassName: ""

    volumes:
      extra:
        - name: tmp
          emptyDir: {}

  serviceMonitor:
    enabled: true

# -- (h4) Alloy gateway instance. Cardinality reduction and backend-specific egress happen here.
# @notationType -- (sectionstart) Alloy Gateway
# @raw
#
# Upstream reference:
#   * https://github.com/grafana/alloy/tree/main/operations/helm/charts/alloy
#   * https://github.com/grafana/alloy/blob/main/operations/helm/charts/alloy/values.yaml
alloy-gateway:
  # Circuit breaker (precedence over `tags.default`, `tags.pipeline`, and `tags.alloy-gateway`):
  # enabled: true
  # -- Standard Helm full-name override.
  # We use a static name for deterministic relations.
  fullnameOverride: "alloy-gateway"
  # -- Namespace override.
  namespaceOverride: null
  # -- Control for the PodLogs crd.
  crds:
    create: false

  global:
    # -- Security context for the alloy gateway pods.
    podSecurityContext:
      runAsUser: 473
      runAsGroup: 473
      fsGroup: 473

  alloy:
    configMap:
      create: false

      name: mzmon-alloy-gateway
      key: config.alloy

    clustering:
      enabled: true
      name: default

    # -- Stability level of alloy components.
    stabilityLevel: generally-available

    enableReporting: false

    storagePath: /tmp/alloy

    # -- Extra environment variables to pass to the alloy gateway pod.
    extraEnv: []
    # -- Environment variable configmaps/secrets to pass to the alloy gateway pod.
    envFrom:
      - configMapRef:
          name: mzmon-alloy-gateway-env
      - secretRef:
          name: mzmon-alloy-gateway-env
          optional: true

    # -- Ports to expose from alloy-gateway.
    extraPorts:
      - name: loki
        port: 3100
        targetPort: 3100
        protocol: TCP
      - name: otlp-grpc
        port: 4317
        targetPort: 4317
        protocol: TCP
      - name: otlp-http
        port: 4318
        targetPort: 4318
        protocol: TCP
      - name: prom
        port: 9090
        targetPort: 9090
        protocol: TCP
      # - name: faro
      #   port: 12347

    # -- Volume mounts to expose to alloy gateway.
    mounts:
      varlog: false

      extra:
        - name: tmp
          mountPath: /tmp

    # -- Security context for the alloy gateway containers.
    securityContext:
      runAsNonRoot: true
      runAsUser: 473
      runAsGroup: 473
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL

    # -- Resources for the alloy gateway containers.
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 500m
        memory: 512Mi

  image:
    registry: ghcr.io
    repository: materializeinc/mzmon-alloy
    tag: v1.17.0-mz1
    digest: sha256:c47e93792dd1b6ddcd75207d49eaa6610a4db4837d950a582bf7ff8563acd68f
    pullPolicy: IfNotPresent

  configReloader:
    enabled: false

  controller:
    type: deployment

    replicas: null

    extraLabels: {}
    # -- Extra annotations to apply to the alloy gateway pod.
    # If you are using pulumi, be sure to add
    # `config.kubernetes.io/depends-on: job/mzmon-validate-gateway`
    extraAnnotations: {}

    hostNetwork: false
    hostPid: false

    nodeSelector: {}
    tolerations: []
    topologySpreadConstraints: []

    priorityClassName: ""

    volumes:
      extra:
        - name: tmp
          emptyDir: {}

    podDisruptionBudget:
      enabled: true
      minAvailable: 1

    autoscaling:
      horizontal:
        enabled: true
        minReplicas: 2
        maxReplicas: 8
        targetCPUUtilizationPercentage: 50
        targetMemoryUtilizationPercentage: 60
        scaleDown:
          stabilizationWindowSeconds: 300
          selectPolicy: Max
          policies:
            - type: Percent
              value: 25
              periodSeconds: 120
        scaleUp:
          stabilizationWindowSeconds: 30
          selectPolicy: Max
          policies:
            - type: Percent
              value: 100
              periodSeconds: 300
            - type: Pods
              value: 2
              periodSeconds: 300

  serviceAccount:
    # -- Create a service account for alloy-gateway.
    create: true
    # -- Extra annotations to set on the alloy-gateway service account.
    # Use `eks.amazonaws.com/role-arn` to set up IRSA.
    annotations: {}

  serviceMonitor:
    enabled: true

# -- (h4) Bundled Loki backend for logs.
# @notationType -- (sectionstart) Loki
# @raw
#
# Upstream reference:
#   * https://github.com/grafana-community/helm-charts/tree/main/charts/loki
#   * https://github.com/grafana-community/helm-charts/blob/main/charts/loki/values.yaml
loki:
  # Circuit breaker (precedence over `tags.default`, `tags.bundled-backends`, and `tags.loki`):
  # enabled: true
  # -- Standard Helm full-name override.
  # We use a static name for deterministic relations.
  fullnameOverride: "loki"
  # -- Namespace override.
  namespaceOverride: null
  # -- How loki is deployed.
  # We prefer to run in Distributed/Microservices mode.
  deploymentMode: Distributed

  # Zero the Simple Scalable targets in Distributed mode.
  # The upstream chart defaults read/write/backend to 3 replicas; running them
  # alongside the distributed targets is rejected by Loki's own validation.
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0

  networkPolicy:
    # -- Whether to enable a network policy for loki
    # In production, this is recommended to be enabled.
    enabled: true
    # YAGNI: flavor not in schema (but we probably don't need cilium anyways)
    # flavor: kubernetes
    # -- Selector for incoming traffic to metric endpoints.
    # This must be configured manually (usually set to `kubernetes.io/metadata.name: monitoring`).
    metrics:
      namespaceSelector: {}
    # -- Selector for incoming traffic to the read/write endpoints.
    # This must be configured manually (usually set to `kubernetes.io/metadata.name: monitoring`).
    ingress:
      namespaceSelector: {}
    # -- Outgoing traffic from loki to the object store.
    # This is usually unrestricted, even in many production settings.
    # Adjust if you have a VPCEndpoint in front of S3/STS or are using a non-standard port.
    externalStorage:
      ports:
        - 443
        - 80
      cidrs:
        - "0.0.0.0/0"

  loki:
    storage:
      # -- Bucket names for object storage.
      # These are required to be populated.
      bucketNames:
        chunks: "<REPLACE-ME>"
        ruler: "<REPLACE-ME>"
      # -- Use the thanos object store client
      use_thanos_objstore: true
      # -- Object storage configuration.
      # Modify as needed.
      object_store:
        type: s3

    # -- Schema configuration for the loki TSDB.
    # This is append-only and MUST be copied into projects and mutated on upgrades
    # (if v13 stops being in use).
    schemaConfig:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h

    # -- Cluster-wide replication factor.
    # Three is our HA floor and the reason at least three ingesters are required.
    # (This matches the upstream default; surfaced here because it is load-bearing.)
    commonConfig:
      replication_factor: 3

    # -- Per-tenant limits, sized for a medium install.
    # These are protective caps (per environment), not the expected volume —
    # see Operating > Production Best Practices for the throughput envelope.
    limits_config:
      # -- Default retention before the compactor deletes logs.
      # Upstream defaults to infinite retention; we set a real bound.
      retention_period: 30d
      # -- Per-tenant ingestion rate / burst, in MB. Per environment, not the fleet aggregate.
      ingestion_rate_mb: 10
      ingestion_burst_size_mb: 20
      # -- Active-stream ceiling per tenant; a cardinality guard.
      max_global_streams_per_user: 10000
      # -- Reject writes too far in the past.
      reject_old_samples: true
      reject_old_samples_max_age: 168h
      # -- Enable the log-volume endpoints Grafana's logs drilldown relies on.
      volume_enabled: true

    # -- Compactor *configuration* (distinct from the compactor deployment below).
    # Retention is enforced by the compactor and is OFF in upstream defaults.
    compactor:
      retention_enabled: true
      # -- Where delete requests are stored; matches the object-store backend.
      delete_request_store: s3
      # -- Grace period before retention/deletes actually remove data.
      retention_delete_delay: 8h

  gateway:
    # -- Disable gateway by default.
    # We recommend using alloy-gateway for loki writes.
    # Use the query-frontend for loki reads.
    enabled: false

  # -- (h5) Configuration for each loki microservice.
  # @notationType -- (sectionstart) Loki Microservice Configuration
  # @raw
  #
  # https://grafana.com/docs/loki/latest/get-started/components/
  distributor:
    # -- Enable the distributor microservice.
    # Distributor is required.
    # The Distributor is the stateless front door for writes.
    # It validates incoming streams against per-tenant limits, enforces rate limits,
    # and normalizes labels, then splits the batch into individual streams and forwards
    # each to the owning ingesters.
    enabled: true

    # -- Number of replicas for the distributor microservice.
    # If autoscaling is enabled, this should be set to null.
    replicas: null

    # -- Type of workload for the distributor.
    kind: Deployment

    # -- Configuration for autoscaling of distributor
    # For production, this is recommended to be enabled.
    # We provide opinionated defaults.
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 4
      targetCPUUtilizationPercentage: 60
      targetMemoryUtilizationPercentage: 75

    service:
      # -- Service type for the distributor microservice.
      # Without a gateway, this is the exposed write component.
      type: ClusterIP

    # -- Configuration for pod disruption budget for the distributor microservice.
    podDisruptionBudget:
      enabled: true
      minAvailable: 1

    # -- Resource requests (medium install). Tune per profile.
    resources:
      requests:
        cpu: 150m
        memory: 256Mi

  ingester:
    # -- Enable the ingester microservice.
    # Ingester is required.
    # The Ingester is the stateful heart of the write path, and it also
    # serves the most recent reads.
    # It buffers incoming entries into per-stream in-memory chunks,
    # compresses them, and periodically flushes those chunks and their
    # index to object storage.
    enabled: true

    # -- Number of ingester replicas.
    # Three is the floor for replication_factor 3. Scale UP on memory /
    # stream-cardinality (so streams shard across the ring), not on bytes —
    # with replicas == replication_factor every ingester holds every stream.
    replicas: 3

    # -- Ingesters are stateful.
    kind: StatefulSet

    persistence:
      # -- Run ingesters ephemerally: no PVC, node-local emptyDir for the WAL
      # and not-yet-flushed chunks. Durability comes from replication_factor 3,
      # not from disk — a rescheduled ingester starts fresh and the ring
      # backfills from its peers. This avoids EBS zonal pinning and the slow
      # volume detach/attach that PVCs incur during node replacement.
      enabled: false

    # -- Termination grace period for ingesters.
    # flush-on-shutdown is best-effort; if the node force-kills sooner, the
    # other replicas still flush their copies, so do not depend on a long grace
    # period for durability. Kept modest to survive enterprise force-kill windows.
    terminationGracePeriodSeconds: 60

    # -- Pod affinity for ingesters.
    # Drop the chart's default *hard* per-host anti-affinity so host spread can
    # be soft (see topologySpreadConstraints); zone spread stays hard. We null
    # the nested list rather than the whole `affinity` map: `affinity: {}` is a
    # no-op against the subchart default, and `affinity: null` clears it but
    # makes helm-unittest log a noisy "cannot overwrite table" warning — nulling
    # the list avoids both.
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution: null

    # -- Topology spread for ingesters: hard across zones, soft across hosts.
    # A pod that cannot satisfy the hard zone rule goes Pending, which is the
    # signal Karpenter (or the cluster-autoscaler) uses to add a node in the
    # deficient zone — soft rules cannot summon capacity that way. Host spread
    # is soft so pods still schedule when nodes are momentarily scarce.
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
        # minDomains must equal the number of zones your node pool can launch in.
        # Setting it above the available zone count leaves pods Pending forever.
        minDomains: 2
        # Count only same-revision pods so a rolling update does not deadlock the
        # skew math; Honor node taints so only usable nodes count (e.g. nodes
        # still carrying a startup taint are excluded until it is removed).
        matchLabelKeys:
          - controller-revision-hash
        nodeTaintsPolicy: Honor
        labelSelector:
          matchLabels:
            app.kubernetes.io/component: ingester
            app.kubernetes.io/name: '{{ include "loki.name" . }}'
            app.kubernetes.io/instance: '{{ .Release.Name }}'
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        matchLabelKeys:
          - controller-revision-hash
        labelSelector:
          matchLabels:
            app.kubernetes.io/component: ingester
            app.kubernetes.io/name: '{{ include "loki.name" . }}'
            app.kubernetes.io/instance: '{{ .Release.Name }}'

    zoneAwareReplication:
      # -- Enable zone-aware replication for the ingester microservice.
      # Not needed at our size: topologySpreadConstraints give the AZ spread
      # without the complexity.
      enabled: false

    # -- PDB for the ingester.
    # Protect ingest quorum across rollouts and node drains.
    # Do not set maxUnavailable >= 2 to avoid potential quorum loss.
    podDisruptionBudget:
      enabled: true
      maxUnavailable: 1

    # -- Resource requests (medium install).
    # The memory *limit* is intentionally left unset: an OOM-kill drops
    # in-memory / WAL-buffered logs, so we alert on usage rather than cap hard.
    resources:
      requests:
        cpu: 500m
        memory: 1Gi

  querier:
    # -- Enable the querier microservice.
    # Querier is required. It executes LogQL, reading recent data from
    # ingesters and historical data from object storage.
    enabled: true

    # -- Replicas are managed by autoscaling; leave null.
    replicas: null
    kind: Deployment

    # -- Autoscale the stateless read workers with query load.
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 4
      targetCPUUtilizationPercentage: 60
      targetMemoryUtilizationPercentage: 75

    # -- PDB for querier.
    podDisruptionBudget:
      enabled: true
      minAvailable: 1

    # -- Resource requests.
    # This assumes a medium install by default.
    resources:
      requests:
        cpu: 250m
        memory: 512Mi

  queryFrontend:
    # -- Enable the query-frontend microservice.
    # Query-frontend is required. It queues and splits queries and caches results.
    enabled: true

    # -- Static replicas for query-frontend when autoscaling is not enabled.
    replicas: null
    # -- Kind of workload for query-frontend.
    # Deployments are recommended for stateless components.
    kind: Deployment

    # -- Configure autoscaling for query-frontend.
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 4
      targetCPUUtilizationPercentage: 60
      targetMemoryUtilizationPercentage: 75

    # -- PDB for query-frontend.
    podDisruptionBudget:
      enabled: true
      minAvailable: 1

    # -- Resource requests for query-frontend.
    resources:
      requests:
        cpu: 100m
        memory: 256Mi

  queryScheduler:
    # -- Enable the query-scheduler microservice.
    # Recommended for scaled deployments: it decouples the read queue from the
    # query-frontend so the two scale independently. Two replicas for availability.
    enabled: true
    replicas: 2

    # HACK: this deprecated value gets merged into querySchedulerr.podDisruptionBudget
    # which is invalid (can't have both minAvailable and maxUnavailable).
    maxUnavailable: null
    # -- PDB for query-scheduler.
    podDisruptionBudget:
      enabled: true
      minAvailable: 1

    # -- Resources for the query-scheduler microservice.
    resources:
      requests:
        cpu: 100m
        memory: 256Mi

  compactor:
    # -- Enable the compactor.
    # Compactor is required and MUST be a singleton: it compacts the index and
    # enforces retention against shared object storage.
    enabled: true
    # -- Compactor replicas.
    # This MUST be one, since it runs as a singleton.
    replicas: 1
    # -- Kind of workload for the compactor.
    # This must be a statefulset.
    kind: StatefulSet

    annotations:
      argocd.argoproj.io/sync-wave: "20"
      config.kubernetes.io/depends-on: statefulset/loki-ingester

    persistence:
      # -- Run the compactor ephemerally (no PVC, node-local emptyDir).
      # Its local dir is just a working copy of the object-store index, and
      # compaction is idempotent and off the critical path — losing it only
      # restarts the current cycle. Ephemeral also lets the singleton float
      # freely between zones instead of being pinned by a PVC. Our production
      # index is ~30MB, so re-downloading each cycle is negligible.
      enabled: false

    # -- Resources for the compactor.
    resources:
      requests:
        cpu: 250m
        memory: 512Mi

  indexGateway:
    # -- Enable the index-gateway.
    # Index-gateway is required: it serves index lookups so queriers do not each
    # download the whole index from object storage.
    enabled: true
    replicas: 2

    # -- Run the index-gateway ephemerally (no PVC, node-local emptyDir).
    # The local index is a read-through cache of object storage, not
    # authoritative — a fresh pod just re-downloads what it queries. This keeps
    # the read path off EBS zonal pinning; the only cost is a little cold-start
    # warmup and a burst of index reads after a reschedule.
    persistence:
      enabled: false

    # -- PDB for index-gateway.
    podDisruptionBudget:
      enabled: true
      minAvailable: 1

    # -- Resources for the index-gateway.
    resources:
      requests:
        cpu: 200m
        memory: 512Mi

  ruler:
    # -- Enable the ruler.
    # The ruler evaluates LogQL alerting and recording rules. Recording-rule
    # samples are remote-written back through alloy-gateway to the metric store.
    enabled: true
    replicas: 2

    persistence:
      # -- Keep a PVC for the ruler (unlike the other components, which are
      # ephemeral). Rule definitions come from object storage, but the ruler's
      # remote-write WAL buffers recording-rule samples when the metric store is
      # unreachable — genuinely useful durability in the run-up to an incident,
      # exactly when you don't want to drop derived signals.
      enabled: true
      size: 5Gi

    # -- PDB for the ruler.
    podDisruptionBudget:
      enabled: true
      minAvailable: 1

    # -- Resources for the ruler.
    resources:
      requests:
        cpu: 100m
        memory: 256Mi

  # -- (h5) Chunk cache (memcached). Default allocation is sized for very large
  # installs; we shrink it to match our volumes. The results cache keeps its
  # upstream default.
  chunksCache:
    allocatedMemory: 2048

  monitoring:
    serviceMonitor:
      # -- Enable a ServiceMonitor for the loki microservices.
      enabled: true
      jobPrefix: loki/

  # -- (h5) End-to-end write→read canary for meta-monitoring.
  # On by default upstream; surfaced here because self-monitoring the log store
  # is a first-class requirement for us.
  lokiCanary:
    enabled: true
    kind: Deployment
    lokiurl: loki-query-frontend:3100
    push: false

# -- (h4) Bundled Thanos backend for long-term metrics.
# @notationType -- (sectionstart) Thanos
# @raw
#
# Upstream reference:
#   * https://github.com/thanos-community/helm-charts/tree/master/charts/thanos
#   * https://github.com/thanos-community/helm-charts/blob/master/charts/thanos/values.yaml
thanos:
  # Circuit breaker (precedence over `tags.default`, `tags.bundled-backends`, and `tags.thanos`):
  # enabled: true
  # -- Standard Helm full-name override.
  # We use a static name for deterministic relations.
  fullnameOverride: "thanos"
  # -- Namespace override.
  namespaceOverride: null

  global:
    objstore:
      createSecret: true
      secretName: thanos-objstore-config
      secretKey: objstore.yml
      config: |
        {{ fail "Either configure this secret or set `thanos.global.objstore.createSecret` to false." }}
    serviceMonitor:
      enabled: true
    serviceAccount:
      annotations: {}
      #   eks.amazonaws.com/role-arn: ""

  # -- Thanos Query configuration. Query provides a PromQL query endpoint.
  query:
    enabled: true

  # -- Thanos receive configuration. Receive provides a Prometheus remote_write-compatible endpoint.
  receive:
    enabled: true
    mode: standalone

  # -- Thanos Store Gateway configuration. Store Gateway provides historical block querying.
  storegateway:
    enabled: true

  # -- (object) Thanos Compactor configuration. Compactor provides block compaction and downsampling.
  # @default -- enabled with default retention policies
  # @notationType -- desc
  compactor:
    enabled: true

    # -- Retention policies for Thanos Compactor downsampled data
    retention:
      resolutionRaw: 30d
      resolution5m: 90d
      resolution1h: 365d

  # -- Thanos Query Frontend configuration. Query Frontend provides query parallelization and result caching. Only required for production.
  queryFrontend:
    enabled: false

  # -- Thanos Ruler configuration. Ruler provides alerting and recording rules evaluation.
  ruler:
    enabled: false

# -- (h4) Bundled Grafana-operator for managing Grafana instances.
# @notationType -- (sectionstart) Grafana Operator
# @raw
#
# Upstream references:
#   * https://grafana.github.io/grafana-operator/docs/installation/helm/#values
#   * https://github.com/grafana/grafana-operator/blob/master/deploy/helm/grafana-operator/values.yaml
grafana-operator:
  # Circuit breaker (precedence over `tags.default`, `tags.managed-grafana`, and `tags.grafana-operator`):
  # enabled:
  # -- CRD behavior
  crds:
    # To install crds during upgrades, this must be false
    immutable: false

  serviceMonitor:
    enabled: true

# -- (h4) Bundled Grafana for dashboard rendering.
# @notationType -- (sectionstart) Grafana Instance
# @raw
#
# Upstream reference:
#   * https://github.com/grafana-community/helm-charts/blob/main/charts/grafana/values.yaml
grafana:
  # Circuit breaker (precedence over `tags.default`, `tags.managed-grafana`, and `tags.grafana-standalone`):
  # enabled: true
  replicas: 1

  grafana.ini: {}

  serviceMonitor:
    enabled: true

# -- (h4) Bundled Alertmanager for routing alerts emitted by the rule packages.
# @notationType -- (sectionstart) Alertmanager
alertmanager: {}
# Circuit breaker (precedence over `tags.default`, `tags.bundled-backends`, and `tags.alertmanager`):
# enabled: true

# -- (h4) kube-state-metrics for Kubernetes resource-state metrics consumed by Materialize-adjacent dashboards.
# @notationType -- (sectionstart) Kube State Metrics
# @raw
#
# Upstream reference:
#    * https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-state-metrics/values.yaml
kube-state-metrics:
  # Circuit breaker (precedence over `tags.default`, `tags.cluster-metrics`, and `tags.kube-state-metrics`):
  # enabled: true
  prometheus:
    monitor:
      enabled: true

# -- (h4) metrics-server for pod and node resource usage; only needed when the cluster does not already ship one.
# @notationType -- (sectionstart) Metrics Server
# @raw
#
# Upstream reference:
#    * https://github.com/kubernetes-sigs/metrics-server/blob/master/charts/metrics-server/values.yaml
metrics-server:
  # Circuit breaker (precedence over `tags.cluster-metrics` and `tags.metrics-server`):
  # enabled: true
  # -- Number of replicas for metrics-server.
  replicas: 1

  metrics:
    enabled: true

  serviceMonitor:
    enabled: true
