# yaml-language-server: $schema=../mzmon-lib/schemas/alloy/mzmon-alloy.schema.yaml
# Alloy gateway destination stub.
# These are processed by mz-monitoring-build gen-pipelines to produce a gateway-dest-stub.alloy config.

description: |
  Default egress tail for the alloy-gateway pipeline, split out from gateway.yaml
  so the write destination can be swapped at chart-assembly time without editing
  the committed processing pipeline.

  gateway.yaml's loki.process.input_processor forwards to
  loki.process.egress.receiver — a type-neutral passthrough seam. This file
  provides that seam plus a default loki.write destination. A deployment may
  render its own version of this tail (for example, pointing egress at an
  otelcol.receiver.loki.<label>.receiver instead of loki.write) as long as it
  keeps the `loki.process "egress"` label as the contract the main pipeline
  references.

  This stub is not a standalone config: it is rendered and validated jointly
  with gateway.alloy (as alloy loads a config directory) — see `make pipelines`.

  loki.write.destination's endpoint is configurable via GATEWAY_LOKI_DEST
  (falling back to an in-cluster default). Auth (basic_auth) is deferred.

blocks:
  # Type-neutral egress seam: input_processor forwards here. Swap this block's
  # forward_to to change the destination (loki.write, an otelcol bridge, a
  # fan-out to several sinks, …) while keeping the `egress` label stable.
  - loki.process:
      label: egress
      forward_to: ["loki.write.destination.receiver"]

  - prometheus.relabel:
      label: egress
      forward_to: ["prometheus.remote_write.destination.receiver"]

  # Default sink: forwards processed entries to the log store.
  - raw:
      component: loki.write
      label: destination
      blocks:
        - component: endpoint
          attributes:
            url:
              function: coalesce
              arguments:
                - env: GATEWAY_LOKI_DEST
                - "http://loki-distributor.monitoring.svc:3100/loki/api/v1/push"

  # Default sink for metrics
  - raw:
      component: prometheus.remote_write
      label: destination
      blocks:
        - component: endpoint
          attributes:
            url:
              function: coalesce
              arguments:
                - env: GATEWAY_PROMETHEUS_DEST
                - "http://thanos-receive.monitoring.svc:9090/api/v1/push"
