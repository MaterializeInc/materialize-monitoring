# Layout of components for versioning and release management.

components:
  docs:
    changelog: false
    title: "materialize-monitoring Docs"
    version_paths: []
    content_paths:
      - docs/
    dependencies:
      - dashboards
      - pipelines
      - scrapers
      - materialize-monitoring
      - mzmon-lib
      - repo-common

  # Helm chart
  materialize-monitoring:
    changelog: true
    title: "materialize-monitoring Helm Chart"
    version_paths:
      - charts/materialize-monitoring/Chart.yaml
    content_paths:
      - charts/materialize-monitoring/
      - tools/chartlib/
    content_exclude:
      # Generated outputs; attributed to their source components (dashboards,
      # pipelines). pre-rendered/rules and pre-rendered/README are exempt until
      # they have a source component.
      - charts/materialize-monitoring/pre-rendered/
    dependencies:
      # Main content ones need to go first (to avoid ties in dependencies)
      - dashboards
      - pipelines
      - scrapers
      # Common goes later
      - mzmon-lib
      - repo-common
    artifacts:
      - charts/materialize-monitoring*.tgz

  # Optional CRDs
  materialize-monitoring-crds:
    changelog: true
    title: "materialize-monitoring Optional CRDs"
    version_paths:
      - charts/materialize-monitoring-crds/Chart.yaml
    content_paths:
      - charts/materialize-monitoring-crds/
      - tools/chartlib/
    dependencies:
      - repo-common

  dashboards:
    changelog: true
    title: "Dashboards"
    version_paths:
      # Only grafana dashboard supported for now
      - packages/grafana-dashboards/pyproject.toml
    content_paths:
      - packages/grafana-dashboards/
      # Generated dashboard output bundled into the chart.
      - charts/materialize-monitoring/pre-rendered/dashboards/
    dependencies:
      - mzmon-lib
      - repo-common
    artifacts:
      - charts/materialize-monitoring/pre-rendered/dashboards/**/*.yaml
      - docs/assets/dashboards/**/*.json

  pipelines:
    changelog: true
    title: "Pipelines"
    version_paths: []
    content_paths:
      - packages/alloy-pipelines/
      # Generated pipeline output bundled into the chart.
      - charts/materialize-monitoring/pre-rendered/pipelines/
    dependencies:
      - mzmon-lib
      - repo-common

  scrapers:
    changelog: true
    title: "Prometheus Scrapers"
    version_paths: []
    content_paths:
      - packages/prometheus-scrapers/
    dependencies:
      - mzmon-lib
      - repo-common
    artifacts:
      - charts/materialize-monitoring/pre-rendered/scrapers/

  # Docker images
  container-images:
    changelog: true
    title: "Container Images"
    version_paths: []
    content_paths:
      - packages/alloy/
    dependencies:
      - repo-common

  mzmon-lib:
    changelog: true
    title: "mzmon-lib (shared library)"
    version_paths:
      - Cargo.toml
      - pyproject.toml
    content_paths:
      # python shared
      - .python-version
      - pyproject.toml
      - uv.lock
      # rust shared
      - Cargo.lock
      - Cargo.toml
      # packages
      - packages/mz-monitoring-build/
      - packages/mz-monitoring-check/
      - packages/mzmon-lib/
      - packages/py-mzmon-lib/
    dependencies:
      - repo-common

  repo-common:
    changelog: false
    title: "Repository Common"
    version_paths: []
    content_paths:
      # go shared
      - go.mod
      - go.sum
      # build common
      - .github/workflows
      - .gitignore
      - bin
      - Makefile
      - packages/components.yaml
      - tools/shlib
