[package]
name = "mzmon-lib"
description = "Common library for Materialize monitoring tools."
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
indexmap = { version = "2.14.0", features = ["serde"] }
itertools = "0.15.0"
jsonschema = { version = "0.48.0", default-features = false }
# PromQL AST parser, used by the query registry's metric extraction to walk
# rendered PromQL and collect the metric names + label matchers each query
# touches. Mirrors the `promql_parser` Python binding the registry was ported
# from (same GreptimeTeam parser under the hood).
promql-parser = "0.10.0"
# Compiles `metricPattern` override globs into anchored regexes matched against
# metric names during importance roll-up.
regex = "1.11.4"
serde = { version = "1.0.228", features = ["derive"] }
# preserve_order keeps map key order from the source YAML through the
# serde_json::Value intermediate (Value uses indexmap instead of BTreeMap).
# Without it, raw-block attributes and any map alphabetize, and sugar like
# replace_map can't render in source order.
serde_json = { version = "1.0.150", features = ["preserve_order"] }
serde_yaml_ng = "0.10.0"
thiserror = "2.0.18"

[dev-dependencies]
# Used by the `alloy fmt` oracle test helper to stage rendered output to disk.
tempfile = "3"
