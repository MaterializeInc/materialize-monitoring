[package]
name = "mzmon-lib"
description = "Common library for Materialize monitoring tools."
version = "0.1.0"
edition = "2024"
publish = false

[dependencies]
indexmap = { version = "2.14.0", features = ["serde"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
serde_yaml_ng = "0.10.0"
thiserror = "2.0.18"

[dev-dependencies]
# Used by the `alloy fmt` oracle test helper to stage rendered output to disk.
tempfile = "3"
