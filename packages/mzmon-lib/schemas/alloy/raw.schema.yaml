# yaml-language-server: $schema=https://json-schema.org/draft/2020-12/schema
# JSONSchema for raw blocks of alloy pipeline definitions
$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://materializeinc.github.io/materialize-monitoring/reference/internal/schemas/alloy/raw.schema.yaml"
title: "Alloy raw block schema"
description: |
  A schema for raw blocks in Alloy pipeline definitions.

  Prefer to use a more specific block definition if possible.
  This is an escape hatch for unsupported blocks or broken schemas.
type: object
properties:
  raw:
    $ref: "#/$defs/block"
required:
  - raw
# Forbid extra keys so this branch is disjoint from loki.schema.yaml's
# `loki.echo` branch in the top-level `blocks` oneOf.
additionalProperties: false
$defs:
  comment:
    description: |
      A comment in the alloy file.

      This is rendered before an expression as a single line or a multiblock comment.
    type: string
  inlineComment:
    description: |
      An inline comment in the alloy file.

      This is rendered after a simple expression on the same line.
    type: string

  label:
    type: string
    description: User-defined identifier to distinguish multiple instances.

  block:
    description: |
      A block unit of configuration.
    type: object
    properties:
      component:
        type: string
        description: The type of this component.
      $comment:
        $ref: "#/$defs/comment"
      label:
        $ref: "#/$defs/label"
      attributes:
        description: |
          A set of attributes for this block.
        type: object
        additionalProperties:
          $ref: "#/$defs/attributeValue"
      blocks:
        type: array
        description: A list of nested blocks.
        items:
          $ref: "#/$defs/block"
    required:
      - component

  attributeObject:
    description: |
      A raw attribute object/map/hash/dictionary.
    type: object
    properties:
      $comment:
        $ref: "#/$defs/comment"
      additionalProperties:
        $ref: "#/$defs/attributeValue"
  commentedValue:
    description: |
      A raw value with an associated comment.
    type: object
    properties:
      value:
        $ref: "#/$defs/attributeValue"
      $comment:
        $ref: "#/$defs/comment"
      $inlineComment:
        $ref: "#/$defs/inlineComment"
    required:
      - value
  attributeValue:
    description: |
      A raw value of an attribute.

      This uses `anyOf` rather than `oneOf` on purpose: the structured object
      branches overlap by design. An expression-shaped object (`{ref: ...}`,
      `{env: ...}`, `{operator: ...}`) is also a valid generic `attributeObject`,
      and a `commentedValue` (`{value: ...}`) is too — so an exactly-one `oneOf`
      would reject every expression/commented value. The Rust deserializer
      (`AttributeValue`, serde untagged) disambiguates by variant order with
      `deny_unknown_fields` on `Expression`; the renderer then emits the right
      form. Schema validation here only needs to confirm the value is *some*
      legal raw value, which is what the raw escape hatch is for.
    anyOf:
      - type: string
      - type: number
      - type: boolean
      - type: "null"
      - $ref: "#/$defs/commentedValue"
      - $ref: "#/$defs/expression"
      - type: array
        items:
          $ref: "#/$defs/attributeValue"
      - $ref: "#/$defs/attributeObject"

  freeFormExpression:
    description: |
      A free-form raw expression.
    type: string
  expression:
    description: |
      A raw expression.

      This one of:
        a function call
        a reference to another component
        a mathematical expression
    type: object
    additionalProperties: false
    properties:
      raw:
        $ref: "#/$defs/freeFormExpression"
      env:
        type: string
        description: Sugar access to sys.env(VAR_NAME)
      function:
        type: string
        description: |
          The function name of this expression.

          See: https://grafana.com/docs/alloy/latest/reference/stdlib/
      arguments:
        type: array
        description: The arguments to a function or operator.
        items:
          $ref: "#/$defs/attributeValue"
      ref:
        type: string
        description: A reference to another component.
      operator:
        type: string
        description: |
          An arithmetic, string, comparison, or logical operator.

          For assignment, grouping, and access operators, use the free-form `raw` field.

          See: https://grafana.com/docs/alloy/latest/get-started/expressions/operators/
        enum:
          # arithmetic operators
          - "+"  # also a string operator
          - "-"
          - "*"
          - "/"
          - "%"
          - "^"
          # comparison operators
          - "=="
          - "!="
          - ">"
          - "<"
          - ">="
          - "<="
          # logical operators
          - "&&"
          - "||"
          - "!"  # the only unary operator in this list

  body:
    description: |
      The body of a block.
      This can be nested blocks or attributes.
    type: object
    properties:
      blocks:
        type: array
        description: A list of nested blocks.
        items:
          $ref: "#/$defs/block"
      assignments:
        type: object
        description: A set of attributes.
        additionalProperties:
          $ref: "#/$defs/attributeValue"
