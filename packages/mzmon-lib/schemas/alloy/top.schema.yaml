# yaml-language-server: $schema=https://json-schema.org/draft/2020-12/schema
# JSONSchema for top-level configuration of alloy pipeline definitions
$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://materializeinc.github.io/materialize-monitoring/reference/internal/schemas/alloy/top.schema.yaml"
title: "Alloy top-level configuration schema"
description: |
  A schema for top-level configuration in Alloy pipeline definitions.

  This is to be limited to the set we want to support; it doesn't need
  to handle every case.
  raw: can be used to escape this schema.

  See: https://grafana.com/docs/alloy/latest/reference/config-blocks/
type: object
properties:
  description:
    type: string
    description: A human-friendly description of the pipeline.
  logging:
    $ref: "#/$defs/logging"
  livedebugging:
    $ref: "#/$defs/livedebugging"
  blocks:
    description: |
      The list of blocks that make up this pipeline.
    type: array
    items:
      # Each block is a single-key object whose key is the discriminator
      # (`raw`, `loki.echo`, ...). The branches are disjoint because each
      # requires its own key and forbids the others, so `oneOf` matches exactly
      # one.
      oneOf:
        - $ref: "./common/raw.schema.yaml"
        - $ref: "./loki.schema.yaml"
        - $ref: "./discovery.schema.yaml"
# Reject unknown top-level keys (description/logging/livedebugging/blocks only).
# unevaluatedProperties (2020-12) is used instead of additionalProperties so it
# still works when this schema is composed via allOf in mzmon-alloy.schema.yaml.
unevaluatedProperties: false

$defs:
  logging:
    x-component-name: logging
    type: object
    description: |
      Configure logging for this alloy instance.
    properties:
      level:
        type: string
        enum:
          - error
          - warn
          - info
          - debug
        description: The log level to use for alloy.
      format:
        type: string
        enum:
          - json
          - logfmt
        description: The log format to use for alloy.
      # YAGNI: write_to?
    additionalProperties: false
  livedebugging:
    x-component-name: livedebugging
    type: object
    properties:
      enabled:
        type: boolean
        description: |
          Whether to enable livedebugging in the UI.
    additionalProperties: false
