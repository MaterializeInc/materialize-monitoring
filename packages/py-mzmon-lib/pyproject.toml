[project]
name = "py-mzmon-lib"
# We are more stable, but not published
version = "0.1.0"
description = "Internal library for shared definitions (Python)"
# readme = "README.md"
requires-python = ">=3.12"

classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Private :: Do Not Upload",
    "Topic :: System :: Monitoring",
]

dependencies = [
    "grafana-foundation-sdk",
    "pydantic>=2.13.3",
    "pydantic-settings>=2.14.0",
]

[build-system]
requires = ["uv_build>=0.11.11,<0.12"]
build-backend = "uv_build"
