apiVersion: monitoring.googleapis.com/v1
kind: PodMonitoring
metadata:
  name: environmentd
  labels:
    app.kubernetes.io/part-of: materialize
    app.kubernetes.io/name: environmentd
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: environmentd
  endpoints:
  - port: internal-http
    interval: 60s
    path: /metrics
