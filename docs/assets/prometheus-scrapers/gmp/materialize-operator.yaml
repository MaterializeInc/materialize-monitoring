apiVersion: monitoring.googleapis.com/v1
kind: PodMonitoring
metadata:
  name: materialize-operator
  labels:
    app.kubernetes.io/part-of: materialize
    app.kubernetes.io/name: materialize-operator
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: materialize-operator
  endpoints:
  - port: metrics
    interval: 60s
    path: /metrics
