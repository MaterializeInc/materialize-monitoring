locale = 'en-us'
title = 'materialize-monitoring Documentation'
baseURL = 'https://materializeinc.github.io/materialize-monitoring/'

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

[module]
  [module.hugoVersion]
    extended = true
    min = "0.158.0"
  [[module.imports]]
    path = "github.com/alex-shpak/hugo-book"

[params]
  BookTheme = 'auto'
  BookToC = true
  BookSearch = true
  BookSection = '/'
  BookRepo = 'https://github.com/MaterializeInc/materialize-monitoring'
  BookEditPath = 'edit/main/docs/content'
