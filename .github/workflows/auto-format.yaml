name: auto-format

# Pushes one formatting commit to PRs labeled `auto-format`. Generated PRs
# (version-update) can't run formatters when their branch is built via the API,
# and the same applies to GitHub UI edits and renovate; labeling opts a PR into
# this fixup pass instead.
#
# NOTE: this fires on PR events from the actor that created/updated the PR. The
# default GITHUB_TOKEN does NOT trigger downstream workflows, so the producer
# (e.g. `propose-bumps`) must authenticate with a PAT or GitHub App token for
# this to run. The push below uses GITHUB_TOKEN, which intentionally does not
# re-trigger this workflow (no loop).
on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: write

concurrency:
  group: auto-format-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  auto-format:
    if: contains(github.event.pull_request.labels.*.name, 'auto-format')
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          lfs: true
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26"
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
      - name: Run formatters
        run: |
          make helm-docs
          cargo fmt --all
          uv run ruff format
          uv run ruff check --fix --exit-zero
      - name: Commit and push if anything changed
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No formatting changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: apply auto-formatters"
          git push
