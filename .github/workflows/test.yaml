name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  cargo-test:
    name: cargo test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --workspace --all-targets --verbose
