name: dashboards

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  dashboards:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.14"
          activate-environment: "true"

      - name: Build Dashboards
        run: >
          make -j4 dashboards
