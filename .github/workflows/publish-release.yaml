name: publish-release

# When a version-update PR merges, tag <component>/vX.Y.Z at the merge commit
# and publish a GitHub Release from that component's changelog section. This
# runs off the PR merge, not every push to the default branch.
on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  packages: write

concurrency:
  group: publish-release-${{ github.event.pull_request.head.ref }}
  cancel-in-progress: false

jobs:
  # Publish container images before cutting the release. Runs for every
  # version-update merge so `publish-release` can depend on it, but only the
  # container-images component actually builds/pushes — for other components
  # this is a no-op that simply succeeds. A failed image push blocks the release.
  publish-images:
    if: >
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'version-update/')
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
      - name: build and push alloy image
        if: github.event.pull_request.head.ref == 'version-update/container-images'
        uses: ./.github/actions/build-alloy-image
        with:
          push: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    needs: publish-images
    if: >
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'version-update/')
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # The merged state on the default branch, whose CHANGELOG carries the
          # just-released section.
          ref: ${{ github.event.pull_request.merge_commit_sha }}
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # Build any build-output artifacts (e.g. the packaged chart .tgz, which is
      # gitignored) before publishing so the component's `artifacts` globs can
      # resolve them. Committed artifacts (pre-rendered dashboards, docs/assets)
      # need no build. Add the toolchain (uv/helm/go) the chosen targets require.
      # - run: make charts dashboards
      - name: publish release
        # Pass the branch/sha via env (never interpolate untrusted refs into the
        # shell). The component is the branch name minus the version-update/ prefix.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          component="${HEAD_REF#version-update/}"
          cargo run -p mz-monitoring-build -- publish-release \
            --component "$component" \
            --sha "$MERGE_SHA"
