name: Build alloy image
description: >
  Build the multi-arch mzmon-alloy distroless image from packages/alloy and,
  optionally, push it to GHCR. Shared by the release and pull-request paths so
  both build the image exactly the same way.

inputs:
  push:
    description: Whether to push the built image to the registry.
    default: "false"
  image-suffix:
    description: >
      Overrides ALLOY_SUFFIX in the image tag. Defaults to the value pinned in
      the Makefile (the release suffix).
    default: ""
  github-token:
    description: Token used to authenticate to GHCR when pushing.
    required: false
    default: ""

outputs:
  tag:
    description: The fully-qualified image tag that was built.
    value: ${{ steps.meta.outputs.tag }}

runs:
  using: composite
  steps:
    # Derive <registry>/mzmon-alloy:<alloy-version>-<suffix> from the repo so the
    # tag stays in lockstep with the Dockerfile/Makefile (single source of truth).
    - name: Resolve image tag
      id: meta
      shell: bash
      run: |
        set -euo pipefail
        version="$(grep -E '^ARG ALLOY_VERSION=' packages/alloy/Dockerfile | head -n1 | cut -d= -f2)"
        registry="$(grep -E '^CONTAINER_REGISTRY \?=' Makefile | head -n1 | sed 's/.*?= *//')"
        suffix="${INPUT_SUFFIX}"
        if [ -z "$suffix" ]; then
          suffix="$(grep -E '^ALLOY_SUFFIX \?=' Makefile | head -n1 | sed 's/.*?= *//')"
        fi
        echo "tag=${registry}/mzmon-alloy:${version}-${suffix}" >> "$GITHUB_OUTPUT"
      env:
        INPUT_SUFFIX: ${{ inputs.image-suffix }}

    # QEMU lets the non-native arch stage (which runs `alloy --version`) execute
    # on the amd64 runner; buildx drives the multi-platform build.
    - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
    - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

    - name: Log in to GHCR
      if: inputs.push == 'true'
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.github-token }}

    - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        context: packages/alloy
        platforms: linux/amd64,linux/arm64
        push: ${{ inputs.push }}
        tags: ${{ steps.meta.outputs.tag }}
        # Supply-chain evidence (NIST SP 800-190 integrity): full build
        # provenance + an SBOM attached to the pushed manifest.
        provenance: mode=max
        sbom: true
